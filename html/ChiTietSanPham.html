<div class="CTSP_ChiTietSanPham">

	<!-- LEFT -->
	<div class="CTSP_BenTrai">
		<div class="CTSP_HinhAnh">
			<img id="CTSP_AnhChinh" src="https://picsum.photos/500/300" alt="">
		</div>

		<div class="CTSP_AnhPhu">
			<img src="https://picsum.photos/500/300?1" class="active">
			<img src="https://picsum.photos/500/300?2">
			<img src="https://picsum.photos/500/300?3">
			<img src="https://picsum.photos/500/300?4">
		</div>
	</div>

	<!-- RIGHT -->
	<div class="CTSP_BenPhai">
		<div class="CTSP_TenSP">Laptop Acer Swift X14 SFX14 72G 77F9</div>

		<div class="CTSP_GiaMoi">
			35.490.000₫
			<span class="CTSP_GiaCu">44.990.000₫</span>
		</div>

		<div class="CTSP_NutMua">
			<button>MUA NGAY</button>
		</div>

		<div class="CTSP_ThongSo">
			<div class="CTSP_ThongSoNB">ĐIỂM NỔI BẬT</div>
			<table>
				<tr><td>CPU</td><td>Intel Core Ultra 7 155H</td></tr>
				<tr><td>VGA</td><td>RTX 4050 6GB</td></tr>
				<tr><td>RAM</td><td>32GB</td></tr>
				<tr><td>SSD</td><td>1TB</td></tr>
				<tr><td>Màn hình</td><td>14.5 inch</td></tr>
				<tr><td>Trọng lượng</td><td>1.5kg</td></tr>
			</table>
		</div>
	</div>

</div>

<script>
	const anhChinh = document.getElementById("CTSP_AnhChinh");
	const dsAnh = document.querySelectorAll(".CTSP_AnhPhu img");

	dsAnh.forEach(function(img){
		img.addEventListener("click", function(){
			anhChinh.src = img.src;
			dsAnh.forEach(function(i){
				i.classList.remove("active");
			});
			img.classList.add("active");
		});
	});
</script>
